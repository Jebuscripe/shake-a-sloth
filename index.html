<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shake a Sloth</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background: linear-gradient(#7cc84a, #3d8b2f);
  color: white;
  overflow: hidden;
}

h1 {
  margin-top: 30px;
  font-size: 2.5em;
  text-shadow: 0 4px 10px rgba(0,0,0,0.4);
}

p {
  opacity: 0.9;
}

#sloth {
  width: 220px;
  margin-top: 40px;
  transition: transform 0.4s ease;
  cursor: pointer;
}

button {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  padding: 16px 40px;
  font-size: 20px;
  border-radius: 40px;
  border: none;
  background: #e6e6e6;
  color: #2e5d2a;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

button:active {
  transform: translateX(-50%) scale(0.95);
}
</style>
</head>

<body>

<h1>Shake a Sloth</h1>
<p>Tap the sloth or button. Chaos follows.</p>

<img
  id="sloth"
  src="assets/sloth.png"
  onclick="shakeSloth()"
/>

<button onclick="resetSloth()">Again!</button>

<script>
const sloth = document.getElementById("sloth");

// preload sounds so they hit instantly
const fallSound = new Audio("assets/fall.mp3");
const impactSound = new Audio("assets/Impact.mp3");

function shakeSloth() {
  // random direction for chaos
  const x = (Math.random() - 0.5) * 200;
  const rotation = (Math.random() - 0.5) * 120;

  sloth.style.transform = `translate(${x}px, 350px) rotate(${rotation}deg)`;

  // play sounds
  fallSound.currentTime = 0;
  impactSound.currentTime = 0;

  fallSound.play();
  setTimeout(() => {
    impactSound.play();
  }, 200);

  // screen shake effect
  document.body.style.animation = "shake 0.3s";
  setTimeout(() => {
    document.body.style.animation = "";
  }, 300);
}

function resetSloth() {
  sloth.style.transform = "translate(0, 0) rotate(0)";
}

// mobile shake support (if they literally shake phone)
window.addEventListener("devicemotion", (event) => {
  if (event.accelerationIncludingGravity.x > 15) {
    shakeSloth();
  }
});

// screen shake keyframes
const style = document.createElement('style');
style.innerHTML = `
@keyframes shake {
  0% { transform: translate(0, 0); }
  25% { transform: translate(5px, -5px); }
  50% { transform: translate(-5px, 5px); }
  75% { transform: translate(5px, 5px); }
  100% { transform: translate(0, 0); }
}`;
document.head.appendChild(style);
</script>

</body>
</html>
